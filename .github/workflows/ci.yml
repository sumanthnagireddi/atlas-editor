name: Build Atlas Editor

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace
        run: npm run build

      - name: Upload web component bundle
        uses: actions/upload-artifact@v4
        with:
          name: atlas-web-components
          path: dist/web-components

      - name: Upload Angular shell build
        uses: actions/upload-artifact@v4
        with:
          name: angular-shell
          path: dist/angular-shell

  publish-angular-package:
    name: Publish Angular package
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: '@sumanthnagireddi'

      - name: Install dependencies
        run: npm ci

      - name: Read Angular package metadata
        id: package
        shell: bash
        run: |
          echo "name=$(node -p 'require(\"./packages/angular/package.json\").name')" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p 'require(\"./packages/angular/package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Check whether npm version already exists
        id: npm-check
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Package version already exists on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Package version does not exist yet; continuing to publish."
          fi

      - name: Validate npm publish token
        if: steps.npm-check.outputs.exists != 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error title=Missing NPM_TOKEN secret::Add repository secret NPM_TOKEN with publish access for @sumanthnagireddi/atlas-angular before re-running this workflow."
            exit 1
          fi

      - name: Publish Angular package to npm
        if: steps.npm-check.outputs.exists != 'true'
        working-directory: packages/angular
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
