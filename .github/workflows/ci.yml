name: Build Atlas Editor

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace
        run: npm run build

      - name: Upload web component bundle
        uses: actions/upload-artifact@v4
        with:
          name: atlas-web-components
          path: dist/web-components

      - name: Upload Angular shell build
        uses: actions/upload-artifact@v4
        with:
          name: angular-shell
          path: dist/angular-shell
